scalar AWSDateTime
scalar AWSJSON

enum AuditStatus {
  PENDING
  PROCESSING
  COMPLETED
  FAILED
}

enum AlertSeverity {
  GREEN
  YELLOW
  RED
}

enum RiskLevel {
  LOW
  MEDIUM
  HIGH
  CRITICAL
}

enum CriticalityIndex {
  LOW
  MEDIUM
  HIGH
  STRATEGIC
}

enum VendorTrend {
  IMPROVING
  STABLE
  DEGRADING
}

enum OnboardingStatus {
  PENDING_FIRST_INVOICE
  ACTIVE
  OFFBOARDING
  ARCHIVED
}

enum SupplierStatus {
  ACTIVE
  SUSPENDED
  BLOCKED
  INACTIVE
}

# ─────────── Supplier core + extensiones enterprise (opcionales) ───────────

type ThresholdPolicy {
  percentTolerance: Float!
  absoluteTolerance: Float
  autoApprovalUpTo: Float
  currency: String!
}

type SupplierContactInfo {
  email: String!
  phone: String
  address: String
}

type RiskProfile {
  score: Float!
  level: RiskLevel!
  lastCheck: String!
}

type PaymentStrategy {
  earlyPaymentPreferred: Boolean!
  discountTargetPercentage: Float!
}

type StrategicIntelligence {
  riskProfile: RiskProfile!
  paymentStrategy: PaymentStrategy!
  diversityStatus: [String!]!
  criticalityIndex: CriticalityIndex!
}

type VendorPerformance {
  reliabilityScore: Float!
  totalAuditedDocs: Int!
  totalDisputesRaised: Int!
  averageDisputeResolutionDays: Float!
  slaDeliveryComplianceRate: Float!
  trend: VendorTrend!
  onboardingStatus: OnboardingStatus
}

type ComplianceAndRisk {
  status: SupplierStatus!
  lastAuditDate: AWSDateTime!
  certifications: [String!]!
  esgComplianceScore: Float!
  primarySectorCode: String!
}

type SmartThresholdCategoryEntry {
  category: String!
  tolerancePercentage: Float!
}

type SmartThresholds {
  defaultTolerancePercentage: Float!
  categories: [SmartThresholdCategoryEntry!]!
}

type Supplier {
  tenantId: ID!
  entityId: ID!
  id: ID!
  name: String!
  taxId: String!
  contactEmail: String!
  fidelityScore: Float!
  thresholdPolicy: ThresholdPolicy!
  versionId: Int
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!

  contactInfo: SupplierContactInfo
  strategicIntelligence: StrategicIntelligence
  vendorPerformance: VendorPerformance
  smartThresholds: SmartThresholds
  complianceAndRisk: ComplianceAndRisk
}

type DeleteSupplierResult {
  tenantId: ID!
  id: ID!
  deleted: Boolean!
}

# ─────────── Budget audit ───────────

type ExtractedBudgetItem {
  sku: String!
  description: String!
  unit: String!
  quantity: Float!
  unitPrice: Float!
  lineTotal: Float!
}

type ExtractedBudget {
  supplierName: String!
  quoteNumber: String
  currency: String!
  issuedAt: AWSDateTime
  items: [ExtractedBudgetItem!]!
  totalAmount: Float!
}

type BudgetAlert {
  sku: String!
  description: String!
  agreedUnitPrice: Float
  quotedUnitPrice: Float!
  deviationPercent: Float!
  severity: AlertSeverity!
  message: String!
}

type Budget {
  tenantId: ID!
  id: ID!
  supplierId: ID!
  contractId: ID
  s3Url: String!
  status: AuditStatus!
  extractedBudget: ExtractedBudget
  alerts: [BudgetAlert!]!
  totalDeviationAmount: Float!
  totalDeviationPercent: Float!
  errorMessage: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type SignedUploadUrl {
  uploadUrl: String!
  s3Url: String!
  key: String!
  expiresIn: Int!
}

# ─────────── Inputs ───────────

input ThresholdPolicyInput {
  percentTolerance: Float!
  absoluteTolerance: Float
  autoApprovalUpTo: Float
  currency: String!
}

input SupplierContactInfoInput {
  email: String!
  phone: String
  address: String
}

input RiskProfileInput {
  score: Float!
  level: RiskLevel!
  lastCheck: String!
}

input PaymentStrategyInput {
  earlyPaymentPreferred: Boolean!
  discountTargetPercentage: Float!
}

input StrategicIntelligenceInput {
  riskProfile: RiskProfileInput!
  paymentStrategy: PaymentStrategyInput!
  diversityStatus: [String!]!
  criticalityIndex: CriticalityIndex!
}

input VendorPerformanceInput {
  reliabilityScore: Float!
  totalAuditedDocs: Int!
  totalDisputesRaised: Int!
  averageDisputeResolutionDays: Float!
  slaDeliveryComplianceRate: Float!
  trend: VendorTrend!
  onboardingStatus: OnboardingStatus
}

input ComplianceAndRiskInput {
  status: SupplierStatus!
  lastAuditDate: AWSDateTime!
  certifications: [String!]!
  esgComplianceScore: Float!
  primarySectorCode: String!
}

input SmartThresholdCategoryEntryInput {
  category: String!
  tolerancePercentage: Float!
}

input SmartThresholdsInput {
  defaultTolerancePercentage: Float!
  categories: [SmartThresholdCategoryEntryInput!]
}

input CreateSupplierInput {
  tenantId: ID!
  entityId: ID
  name: String!
  taxId: String!
  contactEmail: String!
  fidelityScore: Float
  thresholdPolicy: ThresholdPolicyInput
  contactInfo: SupplierContactInfoInput
  strategicIntelligence: StrategicIntelligenceInput
  vendorPerformance: VendorPerformanceInput
  smartThresholds: SmartThresholdsInput
  complianceAndRisk: ComplianceAndRiskInput
}

input UpdateSupplierInput {
  tenantId: ID!
  id: ID!
  entityId: ID
  name: String
  taxId: String
  contactEmail: String
  fidelityScore: Float
  thresholdPolicy: ThresholdPolicyInput
  contactInfo: SupplierContactInfoInput
  strategicIntelligence: StrategicIntelligenceInput
  vendorPerformance: VendorPerformanceInput
  smartThresholds: SmartThresholdsInput
  complianceAndRisk: ComplianceAndRiskInput
}

input AuditBudgetInput {
  tenantId: ID!
  supplierId: ID!
  s3Url: String!
  contractId: ID
}

input SignUploadInput {
  tenantId: ID!
  supplierId: ID!
  fileName: String!
  contentType: String!
}

# ─────────── Operations ───────────

type Query {
  getBudget(tenantId: ID!, supplierId: ID!, budgetId: ID!): Budget
  listBudgetsBySupplier(tenantId: ID!, supplierId: ID!, limit: Int): [Budget!]!
  getSupplier(tenantId: ID!, supplierId: ID!): Supplier
  listSuppliers(tenantId: ID!, limit: Int): [Supplier!]!
}

type Mutation {
  # Auditoría
  auditBudget(input: AuditBudgetInput!): Budget!
  signUpload(input: SignUploadInput!): SignedUploadUrl!

  # Portal de proveedores
  createSupplier(input: CreateSupplierInput!): Supplier!
  updateSupplier(input: UpdateSupplierInput!): Supplier!
  deleteSupplier(tenantId: ID!, id: ID!): DeleteSupplierResult!

  # Mutations internas usadas por la propia Lambda para emitir eventos
  # que despiertan a las subscriptions. NO usar desde el frontend.
  publishAuditCompleted(budget: AWSJSON!): Budget!
  publishAuditFailed(budget: AWSJSON!): Budget!
}

type Subscription {
  onAuditCompleted(tenantId: ID!, supplierId: ID!): Budget
    @aws_subscribe(mutations: ["publishAuditCompleted"])

  onAuditFailed(tenantId: ID!, supplierId: ID!): Budget
    @aws_subscribe(mutations: ["publishAuditFailed"])
}
