name: Deploy Infrastructure

# Cualquier cambio en Terraform reconcilia la infraestructura. El workflow
# está pensado para producción; usa OIDC para asumir un rol IAM en AWS sin
# credenciales estáticas.
on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

# Evita applies concurrentes que corrompan el state remoto.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  terraform:
    name: Plan & Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS OIDC role secret
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "$AWS_DEPLOY_ROLE_ARN" ]; then
            echo "::error::Falta configurar el secret AWS_DEPLOY_ROLE_ARN en GitHub Actions."
            echo "::error::Crear en Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -upgrade

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan -out=tfplan \
            -var "openai_api_key=${{ secrets.OPENAI_API_KEY }}"

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
